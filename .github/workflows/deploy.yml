name: Deploy to Production

on:
  workflow_dispatch:          # Manual trigger only
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: production
        type: choice
        options: [production, staging]
      image_tag:
        description: 'Docker image tag to deploy (e.g. main, v1.2.3, sha-abc1234)'
        required: false
        default: main

jobs:
  deploy:
    name: Deploy — ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "=== Pulling latest images ==="
            docker pull ghcr.io/${{ github.repository }}-backend:${{ inputs.image_tag }}
            docker pull ghcr.io/${{ github.repository }}-frontend:${{ inputs.image_tag }}

            echo "=== Updating image tags in compose ==="
            export BACKEND_TAG=${{ inputs.image_tag }}
            export FRONTEND_TAG=${{ inputs.image_tag }}

            echo "=== Rolling restart ==="
            docker compose -f docker-compose.prod.yml up -d --no-build

            echo "=== Waiting for health check ==="
            sleep 10
            docker compose -f docker-compose.prod.yml ps

            echo "=== Deploy complete ==="

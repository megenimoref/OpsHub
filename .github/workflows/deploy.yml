name: Deploy to Production

on:
  push:
    branches: [main]        # auto-deploy on every merge to main
  workflow_dispatch:         # keep manual trigger as well

# Never run two deploys at the same time
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy — Production
    runs-on: [self-hosted, Linux, ARM64, oracel]

    steps:
      - name: Pull latest code
        run: |
          cd $HOME/crm/OpsHub
          for i in 1 2 3; do
            git pull origin main && break
            echo "git pull failed (attempt $i/3), retrying in 10s..."
            sleep 10
          done

      - name: Run deploy script
        run: bash $HOME/crm/OpsHub/devops/deploy.sh

name: Deploy to Production

on:
  push:
    branches: [main]        # auto-deploy on every merge to main
  workflow_dispatch:         # keep manual trigger as well

# Never run two deploys at the same time
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy — Production
    runs-on: [self-hosted, Linux, ARM64, oracel]

    steps:
      - name: Pull latest code
        run: |
          cd $HOME/OpsHub
          git pull origin main

      - name: Build & restart containers
        run: |
          cd $HOME/OpsHub
          sudo docker compose --env-file .env -f docker-compose.prod.yml up -d --build

      - name: Health check
        run: |
          sleep 15
          cd $HOME/OpsHub
          sudo docker compose -f docker-compose.prod.yml ps
          echo "Deploy complete"

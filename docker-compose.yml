version: "3.8"

services:
  api:
    image: node:20-alpine
    container_name: crm-api
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "npm install && npm run build && node dist/app.js"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=crm
      - DB_USER=root
      - DB_PASSWORD=change_me
      - JWT_SECRET=change_me_in_production
      - JWT_EXPIRES_IN=24h
      - CORS_ORIGIN=http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      - db
    mem_limit: 300m
    restart: unless-stopped
    networks:
      - crm-network

  db:
    image: mariadb:11
    container_name: crm-db
    environment:
      - MARIADB_ROOT_PASSWORD=change_me
      - MARIADB_DATABASE=crm
    command: >
      --innodb-buffer-pool-size=128M
      --max-connections=40
      --key-buffer-size=16M
      --table-open-cache=200
    volumes:
      - dbdata:/var/lib/mysql
      - ./backend/src/migrations/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    mem_limit: 400m
    restart: unless-stopped
    networks:
      - crm-network

networks:
  crm-network:
    driver: bridge

volumes:
  dbdata:

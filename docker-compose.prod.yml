services:
  db:
    image: mariadb:11.4
    container_name: crm-db
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    command: >
      --innodb-buffer-pool-size=128M
      --max-connections=40
      --key-buffer-size=16M
      --table-open-cache=200
    volumes:
      - dbdata:/var/lib/mysql
      - ./backend/src/migrations/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
      - ./backend/src/migrations/create_crm_user.sql:/docker-entrypoint-initdb.d/002-create_crm_user.sql:ro
    restart: unless-stopped
    networks: [crm-net]

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm-api
    environment:
      NODE_ENV: production
      PORT: "3000"
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: ${CORS_ORIGIN}
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      # Green API (WhatsApp). GREEN_API_URL is optional — if blank the
      # service auto-derives https://<idInstance>.api.green-api.com.
      GREEN_API_ID_INSTANCE: ${GREEN_API_ID_INSTANCE:-}
      GREEN_API_TOKEN_INSTANCE: ${GREEN_API_TOKEN_INSTANCE:-}
      GREEN_API_URL: ${GREEN_API_URL:-}
      # Shared HMAC secret for issuing signed TimeTable SSO links. MUST match
      # the value passed to the `timetable` service. Generate with:
      #   openssl rand -hex 32
      TIMETABLE_SSO_SECRET: ${TIMETABLE_SSO_SECRET}
    depends_on: [db]
    restart: unless-stopped
    networks: [crm-net]
    volumes:
      # Persist backups on the host so they survive container rebuilds.
      # Without this, every `docker compose up -d --build` wipes /app/backups.
      - ./backups:/app/backups

  drive-uploader:
    build:
      context: ./drive-uploader
      dockerfile: Dockerfile
    container_name: crm-drive-uploader
    environment:
      # cron expression in node-cron format (default: every Sunday at 03:00)
      CRON_SCHEDULE: ${DRIVE_UPLOADER_CRON:-0 3 * * 0}
      TZ: ${TZ:-Asia/Jerusalem}
      BACKUP_DIR: /app/backups
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID}
      GOOGLE_SERVICE_ACCOUNT_KEY: /run/secrets/gdrive-key.json
      # Optional: if set, only files modified within the last N hours are uploaded
      MAX_AGE_HOURS: ${DRIVE_UPLOADER_MAX_AGE_HOURS:-192}
    volumes:
      - ./backups:/app/backups:ro
      - ./drive-uploader/secrets/gdrive-key.json:/run/secrets/gdrive-key.json:ro
    restart: unless-stopped
    networks: [crm-net]

  # TimeTable — separate microservice (own image, own DB, own deploy cycle).
  # Reverse-proxied by `web` at /timetable/. Auto-login via ?email=... uses the
  # /api/login-by-email endpoint, so users coming from OpsHub never see a
  # second login screen. To rebuild only this service without touching api/web:
  #   docker compose -f docker-compose.prod.yml build timetable
  #   docker compose -f docker-compose.prod.yml up -d timetable
  timetable:
    build:
      context: ./timetable
      dockerfile: Dockerfile
    container_name: crm-timetable
    environment:
      PORT: "5222"
      DB_PATH: /app/data/timetable.db
      TZ: ${TZ:-Asia/Jerusalem}
      # Same secret as the api service — used to verify signed SSO payloads
      # arriving in /api/login-by-email.
      TIMETABLE_SSO_SECRET: ${TIMETABLE_SSO_SECRET}
    volumes:
      - timetable-data:/app/data
    restart: unless-stopped
    networks: [crm-net]
    healthcheck:
      # /api/users returns JSON — a 200 means Express is up and SQLite opened
      # cleanly. Use node (always present) instead of wget/curl which aren't
      # guaranteed in node:20-alpine.
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5222/api/users',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${PUBLIC_URL}/api
    container_name: crm-web
    depends_on: [api, timetable]
    ports:
      - "80:80"
    restart: unless-stopped
    networks: [crm-net]

networks:
  crm-net:
    driver: bridge

volumes:
  dbdata:
  timetable-data:

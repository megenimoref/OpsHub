services:
  db:
    image: mariadb:11.4
    container_name: crm-db-dev
    environment:
      MARIADB_ROOT_PASSWORD: devroot
      MARIADB_DATABASE: crm
      MARIADB_USER: crm_user
      MARIADB_PASSWORD: crm_dev_pass
    volumes:
      - dbdata-dev:/var/lib/mysql
      - ./backend/src/migrations/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
      - ./backend/src/migrations/create_crm_user.sql:/docker-entrypoint-initdb.d/002-create_crm_user.sql:ro
    networks: [crm-net]

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: crm-api-dev
    env_file: ./backend/.env
    environment:
      NODE_ENV: development
      PORT: "3000"
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: crm
      DB_USER: crm_user
      DB_PASSWORD: crm_dev_pass
      CORS_ORIGIN: http://localhost:5173
    volumes:
      - ./backend/src:/app/src
    depends_on:
      - db
    networks: [crm-net]

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: crm-web-dev
    environment:
      VITE_API_URL: /api
      VITE_OPENAI_API_KEY: ${VITE_OPENAI_API_KEY:-}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - api
    networks: [crm-net]

networks:
  crm-net:
    driver: bridge

volumes:
  dbdata-dev:
